id: all_go
namespace: sanitychecks.plugin-scripts

tasks:
  - id: script
    type: io.kestra.plugin.scripts.go.Script
    allowWarning: true # golang redirects all output to stderr even for non-errors
    outputFiles:
      - output.csv
    script: |
      package main
      import (
          "encoding/csv"
          "os"
      )
      func main() {
          file, _ := os.Create("output.csv")
          defer file.Close()
          w := csv.NewWriter(file)
          _ = w.Write([]string{"Name", "Age"})
          _ = w.Write([]string{"Alice", "25"})
          _ = w.Write([]string{"Bob", "30"})
          w.Flush()
      }

  - id: commands
    type: io.kestra.plugin.scripts.go.Commands
    allowWarning: true # golang redirects all output to stderr even for non-errors
    inputFiles:
      go_script.go: |
        package main
        import (
            "encoding/csv"
            "os"
        )
        func main() {
            file, _ := os.Create("output.csv")
            defer file.Close()
            w := csv.NewWriter(file)
            _ = w.Write([]string{"Name", "Age"})
            _ = w.Write([]string{"Alice", "25"})
            _ = w.Write([]string{"Bob", "30"})
            w.Flush()
        }
    outputFiles:
      - output.csv
    commands:
      - go run go_script.go
